name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: node scripts/check-backlog.mjs

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    # GATING (ticket 0006): runs against a REAL local Supabase seeded with
    # tests/e2e/fixtures/seed.sql. No `|| true` — a red Playwright run fails the
    # job, and `e2e-tests` is a required status check on `main` alongside `lint`
    # and `unit-tests`. Build + server get the real local Supabase URL / keys
    # (not localhost:54321 + test-anon-key) so middleware auth + the share
    # page's server components can reach the DB. Stripe stays dummy — no E2E
    # test walks a real Stripe checkout.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # Stand up a full local Supabase (Postgres + Auth + Storage) via the CLI.
      # The ubuntu-latest runner has Docker; `supabase start` applies the
      # numbered migrations under supabase/migrations/ on boot.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase
        run: supabase start

      # Capture the emitted API URL + keys into the job env so build/start use
      # the REAL local instance. `--override-name` maps the CLI's status keys
      # straight onto the env var names the app reads — more robust than parsing
      # the default KEY="value" output. Values are quoted; cut the quotes off.
      - name: Export Supabase env
        run: |
          STATUS="$(supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            --override-name db.url=SUPABASE_DB_URL)"
          echo "$STATUS" | sed 's/="/=/; s/"$//' >> "$GITHUB_ENV"

      # Seed the minimum rows the specs need. Runs AFTER Supabase is up and
      # BEFORE the server starts. ON_ERROR_STOP=1 means a seed failure fails the
      # job — no `|| true` masking.
      - name: Seed test data
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f tests/e2e/fixtures/seed.sql

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          STRIPE_PRICE_COACH_MONTHLY: price_dummy
          STRIPE_PRICE_COACH_ANNUAL: price_dummy
          STRIPE_PRICE_PRO_MONTHLY: price_dummy
          STRIPE_PRICE_PRO_ANNUAL: price_dummy
          STRIPE_PRICE_ORG_MONTHLY: price_dummy
          STRIPE_PRICE_ORG_ANNUAL: price_dummy
          # Ticket 0050: the program-referral POST + the director-side share
          # page render need a non-empty CRON_SECRET to sign / verify the
          # signed_director_id HMAC. A deterministic test value keeps the e2e
          # spec's computed token byte-identical to what the server signs.
          # The same value is exported below for the server runtime and the
          # spec env so the spec can re-sign / verify the token locally.
          CRON_SECRET: ci-program-referral-secret-0050
      - name: Start server
        run: npm start &
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          PORT: 3000
          # Same secret as the Build step so the running server signs with
          # the value the e2e spec is configured to verify (ticket 0050).
          CRON_SECRET: ci-program-referral-secret-0050
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3000 > /dev/null && break
            sleep 1
          done
      # No `|| true` — a red Playwright run fails the job. Chromium-only for v1
      # PR-gating (mobile-chrome is a separate hardening ticket, see 0006).
      - run: npm run test:e2e -- --project=chromium
        env:
          E2E_BASE_URL: http://localhost:3000
          # Ticket 0050: the program-referral e2e spec re-signs the
          # signed_director_id locally to verify the director-side banner +
          # claim CTA render under the same secret the server is using.
          CRON_SECRET: ci-program-referral-secret-0050
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
